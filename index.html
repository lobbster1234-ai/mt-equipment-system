<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT 部門儀器借用系統</title>
  <link rel="stylesheet" href="css/style.css?v=20260430-1052">
</head>
<body>
  <div class="container">
    <header>
      <h1>🦐 MT 部門儀器借用系統</h1>
      <nav>
        <button class="nav-btn active" data-tab="equipment">📦 設備列表</button>
        <button class="nav-btn" data-tab="history">📜 歷史紀錄</button>
        <button class="nav-btn" data-tab="register">➕ 設備登記</button>
        <button class="nav-btn" data-tab="settings">⚙️ 個人設定</button>
      </nav>
    </header>

    <!-- 設備列表 -->
    <section id="equipment-tab" class="tab-content active">
      <div class="search-bar">
        <input type="text" id="search-keyword" placeholder="🔍 搜尋關鍵字...">
        <select id="search-department">
          <option value="">所有部門</option>
        </select>
        <select id="search-status">
          <option value="">所有狀態</option>
          <option value="available">可借用</option>
          <option value="borrowed">已借出</option>
        </select>
        <button onclick="searchEquipment()">搜尋</button>
      </div>
      <div id="equipment-list" class="equipment-list">
        <p style="text-align:center;color:#666;padding:40px;">🔄 載入中...</p>
      </div>
    </section>

    <!-- 歷史紀錄 -->
    <section id="history-tab" class="tab-content">
      <div class="search-bar">
        <input type="text" id="history-keyword" placeholder="🔍 搜尋關鍵字...">
        <select id="history-action">
          <option value="">所有動作</option>
          <option value="borrow">借用</option>
          <option value="return">待確認</option>
          <option value="confirm">已歸還</option>
        </select>
        <button onclick="searchHistory()">搜尋</button>
      </div>
      <div id="history-list" class="history-list">
        <p style="text-align:center;color:#666;padding:40px;">🔄 載入中...</p>
      </div>
    </section>

    <!-- 設備登記 -->
    <section id="register-tab" class="tab-content">
      <form id="register-form" class="form-card">
        <h2>📦 新增設備</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>設備類型 (fix_type) *</label>
            <select name="fix_type" required>
              <option value="">請選擇設備類型</option>
              <option value="儀器設備">儀器設備</option>
              <option value="其他設備">其他設備</option>
              <option value="雜項購置">雜項購置</option>
              <option value="電腦週邊用品">電腦週邊用品</option>
            </select>
          </div>
          <div class="form-group">
            <label>設備編號 (fix_no)</label>
            <input type="text" name="fix_no" placeholder="可自填">
          </div>
          <div class="form-group full-width">
            <label>設備名稱 (device_name) *</label>
            <input type="text" name="device_name" required placeholder="例如：示波器 Tektronix TDS2014C">
          </div>
          <div class="form-group">
            <label>數量 (qty_asset)</label>
            <input type="text" name="qty_asset" value="1">
          </div>
          <div class="form-group">
            <label>保管人 (keeper)</label>
            <input type="text" name="keeper" placeholder="例如：王小明">
          </div>
        </div>
        <button type="submit" class="btn-primary">登記設備</button>
      </form>
    </section>

    <!-- 個人設定 -->
    <section id="settings-tab" class="tab-content">
      <div class="form-card" style="max-width:500px;margin:0 auto;">
        <h2>⚙️ 個人頭像設定</h2>
        <p style="color:#666;font-size:0.9em;margin-bottom:20px;">上傳你的照片，作為借用/歸還記錄的頭像顯示</p>
        
        <form id="avatar-form">
          <div class="form-group">
            <label>你的姓名 *</label>
            <input type="text" id="avatar-name" required placeholder="請輸入你的姓名（需與借用/歸還時輸入的名字一致）">
          </div>
          <div class="form-group">
            <label>頭像圖片</label>
            <div style="display:flex;align-items:center;gap:15px;">
              <input type="file" id="avatar-file" accept="image/*" style="flex:1;">
              <img id="avatar-preview" src="" style="width:60px;height:60px;border-radius:50%;object-fit:cover;display:none;border:2px solid #ddd;">
            </div>
            <p style="color:#888;font-size:0.8em;margin-top:5px;">支援 JPG、PNG 圖片，建議使用正方形圖片效果最佳</p>
          </div>
          <button type="submit" class="btn-primary" style="width:100%;">上傳頭像</button>
        </form>
        
        <div id="avatar-status" style="margin-top:15px;text-align:center;"></div>
        
        <h3 style="margin-top:30px;font-size:1.1em;">📋 目前已上傳頭像的使用者</h3>
        <div id="avatar-list" style="margin-top:10px;"></div>
      </div>
    </section>
  </div>

  <!-- 借用 Modal -->
  <div id="borrow-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeBorrowModal()">&times;</span>
      <h2>📤 借用設備</h2>
      <div id="borrow-equipment-info"></div>
      <form id="borrow-form">
        <input type="hidden" id="borrow-fix-no">
        <div class="form-group">
          <label>借用人姓名 *</label>
          <input type="text" id="borrow-name" required placeholder="請輸入您的姓名">
        </div>
        <div class="form-group">
          <label>預計歸還日期 *</label>
          <input type="date" id="borrow-due-date" required>
        </div>
        <button type="submit" class="btn-primary">確認借用</button>
      </form>
    </div>
  </div>

  <!-- 歸還 Modal -->
  <div id="return-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeReturnModal()">&times;</span>
      <h2>📥 歸還設備</h2>
      <div id="return-equipment-info"></div>
      <form id="return-form">
        <input type="hidden" id="return-fix-no">
        <div class="form-group">
          <label>歸還日期</label>
          <input type="date" id="return-date" required>
        </div>
        <p style="color:#666;font-size:0.9em;margin-top:15px;">
          📧 送出後系統會自動寄信通知保管人（Keeper）<br>
          ✅ 設備狀態需等待 Keeper 點擊郵件中的【確認已收到】按鈕後才會更新
        </p>
        <button type="submit" class="btn-primary">📧 通知歸還</button>
      </form>
    </div>
  </div>

  <script src="js/app.js?v=20260430-1036"></script>
</body>
</html>
