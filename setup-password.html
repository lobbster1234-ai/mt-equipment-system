<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>首次登入 - 設定密碼 | MT 設備系統</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .setup-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 1.8em;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95em;
    }
    
    .welcome-message {
      background: #f0f7ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 25px;
      text-align: left;
      border-radius: 4px;
    }
    
    .welcome-message strong {
      color: #667eea;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .password-requirements {
      font-size: 0.85em;
      color: #666;
      margin-top: 5px;
    }
    
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    
    .btn-submit:hover {
      background: #5568d3;
    }
    
    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .error-message {
      color: #dc3545;
      margin-top: 15px;
      font-size: 0.9em;
      display: none;
    }
    
    .success-message {
      color: #28a745;
      margin-top: 15px;
      font-size: 0.9em;
      display: none;
    }
    
    .loading {
      display: none;
      color: #667eea;
      margin-top: 15px;
    }
    
    .back-link {
      margin-top: 20px;
      font-size: 0.9em;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="setup-container">
    <h1>🔐 首次登入設定</h1>
    <p class="subtitle">歡迎使用 MT 設備系統</p>
    
    <div class="welcome-message">
      <strong>👋 你好，<span id="user-name">使用者</span>！</strong><br><br>
      這是你第一次登入系統，請設定你的密碼。<br>
      設定完成後，請使用此密碼進行後續登入。
    </div>
    
    <div class="form-group">
      <label>新密碼</label>
      <input type="password" id="new-password" placeholder="請設定密碼（至少 4 個字元）">
      <div class="password-requirements">※ 建議使用字母+數字組合</div>
    </div>
    
    <div class="form-group">
      <label>確認密碼</label>
      <input type="password" id="confirm-password" placeholder="再次輸入密碼">
    </div>
    
    <button class="btn-submit" onclick="setupPassword()">設定密碼並登入</button>
    
    <div id="error-message" class="error-message"></div>
    <div id="success-message" class="success-message"></div>
    <div id="loading" class="loading">🔄 設定中...</div>
    
    <div class="back-link">
      <a href="./login.html">← 返回登入頁面</a>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeI5xC33a6Ry634g6kwBPK9feElH_tTPtQYeWcH4ReiEiiq5I9yIetv8ugAFDgJkHh1A/exec';
    
    // 取得暫存的使用者資訊
    const setupData = JSON.parse(sessionStorage.getItem('mt_setup_password') || '{}');
    
    // 檢查是否有暫存資料
    if (!setupData.email || !setupData.name) {
      // 沒有暫存資料，跳回登入頁
      window.location.href = './login.html';
    }
    
    // 顯示使用者名稱
    document.getElementById('user-name').textContent = setupData.name || '使用者';
    
    function setupPassword() {
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      // 驗證
      if (!newPassword) {
        showError('請輸入新密碼');
        return;
      }
      
      if (newPassword.length < 4) {
        showError('密碼長度至少 4 個字元');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showError('兩次輸入的密碼不一致');
        return;
      }
      
      showLoading(true);
      hideError();
      hideSuccess();
      
      // 呼叫 GAS 設定密碼
      const url = new URL(GAS_URL);
      url.searchParams.append('action', 'setupPassword');
      url.searchParams.append('email', setupData.email);
      url.searchParams.append('newPassword', newPassword);
      
      fetch(url.toString(), { method: 'GET', redirect: 'follow' })
        .then(res => res.json())
        .then(data => {
          showLoading(false);
          
          if (data.success) {
            showSuccess('密碼設定成功！正在登入...');
            
            // 清除暫存
            sessionStorage.removeItem('mt_setup_password');
            
            // 儲存登入資訊
            localStorage.setItem('mt_user', JSON.stringify({
              role: 'admin',
              email: setupData.email,
              name: setupData.name,
              timestamp: Date.now()
            }));
            
            // 2 秒後跳轉到主頁
            setTimeout(() => {
              window.location.href = './index.html';
            }, 1500);
          } else {
            showError(data.error || '設定密碼失敗');
          }
        })
        .catch(err => {
          showLoading(false);
          showError('設定失敗：' + err.message);
        });
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = '❌ ' + message;
      errorDiv.style.display = 'block';
    }
    
    function hideError() {
      document.getElementById('error-message').style.display = 'none';
    }
    
    function showSuccess(message) {
      const successDiv = document.getElementById('success-message');
      successDiv.textContent = '✅ ' + message;
      successDiv.style.display = 'block';
    }
    
    function hideSuccess() {
      document.getElementById('success-message').style.display = 'none';
    }
    
    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
      document.querySelector('.btn-submit').disabled = show;
    }
    
    // Enter 鍵提交
    document.getElementById('confirm-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        setupPassword();
      }
    });
  </script>
</body>
</html>
