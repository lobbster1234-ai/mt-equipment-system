<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>登入 - MT 設備系統</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 1.8em;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95em;
    }
    
    .login-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #e9ecef;
    }
    
    .login-tab {
      flex: 1;
      padding: 12px;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 1em;
      color: #666;
      transition: all 0.3s;
    }
    
    .login-tab.active {
      color: #667eea;
      border-bottom: 3px solid #667eea;
      font-weight: bold;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn-login {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    
    .btn-login:hover {
      background: #5568d3;
    }
    
    .btn-guest {
      width: 100%;
      padding: 15px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 15px;
    }
    
    .btn-guest:hover {
      background: #5a6268;
    }
    
    .error-message {
      color: #dc3545;
      margin-top: 15px;
      font-size: 0.9em;
      display: none;
    }
    
    .loading {
      display: none;
      color: #667eea;
      margin-top: 15px;
    }
    
    .role-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: left;
      font-size: 0.9em;
      color: #666;
    }
    
    .role-info.admin {
      border-left: 4px solid #667eea;
    }
    
    .role-info.guest {
      border-left: 4px solid #6c757d;
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🔐 MT 設備系統</h1>
    <p class="subtitle">請選擇登入方式</p>
    
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchTab('admin')">管理員登入</button>
      <button class="login-tab" onclick="switchTab('guest')">訪客登入</button>
    </div>
    
    <!-- 管理員登入表單 -->
    <div id="admin-login-form">
      <div class="role-info admin">
        <strong>✓ 管理員權限</strong><br>
        • 借用/歸還設備<br>
        • 登記新設備<br>
        • 查看所有記錄
      </div>
      
      <div class="form-group">
        <label>帳號 / 電子郵件</label>
        <input type="text" id="admin-email" placeholder="請輸入帳號或電子郵件">
      </div>
      
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="admin-password" placeholder="請輸入密碼">
      </div>
      
      <button class="btn-login" onclick="loginAdmin()">登入</button>
    </div>
    
    <!-- 訪客登入表單 -->
    <div id="guest-login-form" class="hidden">
      <div class="role-info guest">
        <strong>✓ 訪客權限</strong><br>
        • 借用/歸還設備<br>
        • 查看設備列表<br>
        • 不可登記新設備
      </div>
      
      <div class="form-group">
        <label>您的姓名</label>
        <input type="text" id="guest-name" placeholder="請輸入您的姓名">
      </div>
      
      <button class="btn-guest" onclick="loginGuest()">訪客登入</button>
    </div>
    
    <div id="error-message" class="error-message"></div>
    <div id="loading" class="loading">🔄 登入中...</div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeI5xC33a6Ry634g6kwBPK9feElH_tTPtQYeWcH4ReiEiiq5I9yIetv8ugAFDgJkHh1A/exec';
    
    // 切換登入頁籤
    function switchTab(role) {
      const tabs = document.querySelectorAll('.login-tab');
      tabs.forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      
      if (role === 'admin') {
        document.getElementById('admin-login-form').classList.remove('hidden');
        document.getElementById('guest-login-form').classList.add('hidden');
      } else {
        document.getElementById('admin-login-form').classList.add('hidden');
        document.getElementById('guest-login-form').classList.remove('hidden');
      }
      
      hideError();
    }
    
    // 管理員登入
    async function loginAdmin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      
      if (!email || !password) {
        showError('請填寫電子郵件和密碼');
        return;
      }
      
      showLoading(true);
      
      try {
        const url = new URL(GAS_URL);
        url.searchParams.append('action', 'loginAdmin');
        url.searchParams.append('email', encodeURIComponent(email));
        url.searchParams.append('password', encodeURIComponent(password));
        
        const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
        const data = await res.json();
        
        console.log('登入回應:', data);  // 除錯用
        
        if (data.success) {
          // 儲存登入資訊
          localStorage.setItem('mt_user', JSON.stringify({
            role: 'admin',
            email: email,
            name: data.name,
            timestamp: Date.now()
          }));
          // 跳轉到主頁面
          window.location.href = './index.html';
        } else {
          showError(data.error || '登入失敗');
        }
      } catch (err) {
        showError('登入失敗：' + err.message);
      } finally {
        showLoading(false);
      }
    }
    
    // 訪客登入
    function loginGuest() {
      const name = document.getElementById('guest-name').value.trim();
      
      if (!name) {
        showError('請輸入您的姓名');
        return;
      }
      
      // 儲存訪客資訊
      localStorage.setItem('mt_user', JSON.stringify({
        role: 'guest',
        name: name,
        timestamp: Date.now()
      }));
      
      // 跳轉到主頁面
      window.location.href = './index.html';
    }
    
    // 顯示錯誤
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = '❌ ' + message;
      errorDiv.style.display = 'block';
    }
    
    // 隱藏錯誤
    function hideError() {
      document.getElementById('error-message').style.display = 'none';
    }
    
    // 顯示/隱藏載入中
    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
    
    // 檢查是否已登入
    if (localStorage.getItem('mt_user')) {
      window.location.href = './index.html';
    }
  </script>
</body>
</html>
